            { id: 8, type: "vocab", question: "Gapni to'ldiring: 我去机场 ___ 朋友。(Men aeroportga do'stimni kutib olgani ketyapman.)", options: ["送", "接", "找", "看"], answer: "接" },
            { id: 9, type: "grammar", question: "Harakat davomiyligini qaysi gap to'g'ri ifodalagan?", options: ["工作了三年她。", "她工作三年了。", "她工作了三年。", "她了三年工作。"], answer: "她工作了三年。" },
            { id: 10, type: "grammar", question: "\"Men xitoy tilini bir yildan beri o'rganyapman (va hali ham)\" qaysi biri to'g'ri?", options: ["我学习一年汉语了。", "我学习了一年汉语。", "我学习了一年汉语了。", "我一年汉语学习了。"], answer: "我学习了一年汉语了。" },
            { id: 11, type: "grammar", question: "\"Ular kinoga qiziqadi\" ning to'g'ri tarjimasi qaysi?", options: ["他们电影很感兴趣。", "他们对电影感兴趣。", "对他们电影感兴趣。", "电影对他们感兴趣。"], answer: "他们对电影感兴趣。" },
            { id: 12, type: "grammar", question: "\"Men unga ko'proq qiziqaman\" gapining xitoycha to'g'ri ko'rinishi:", options: ["我对她更感兴趣。", "她对我更感兴趣。", "我很感兴趣她。", "我更感兴趣对她。"], answer: "我对她更感兴趣。" },
            { id: 13, type: "grammar", question: "Soat 12:15 qanday aytiladi?", options: ["十二点一刻", "十二点半", "差一刻十二点", "十二点十分"], answer: "十二点一刻" },
            { id: 14, type: "grammar", question: "Soat 7:45 qanday aytiladi?", options: ["七点差一刻", "差一刻八点", "八点一刻", "七点半"], answer: "差一刻八点" },
            { id: 15, type: "grammar", question: "Gapni to'ldiring: 你们 ___ 刚认识吗？ (Sizlar endi tanishmadingizlarmi?)", options: ["不是", "对不起", "没关系", "知道"], answer: "不是" }
        ];

        // --- 主程序逻辑 ---
        function App() {
            const [activeTab, setActiveTab] = useState('flashcards');
            const [currentCard, setCurrentCard] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);
            const [quizAnswers, setQuizAnswers] = useState({});
            const [quizSubmitted, setQuizSubmitted] = useState(false);
            const [score, setScore] = useState(0);

            const handleNextCard = () => {
                setIsFlipped(false);
                setCurrentCard((prev) => (prev + 1) % vocabList.length);
            };

            const handlePrevCard = () => {
                setIsFlipped(false);
                setCurrentCard((prev) => (prev - 1 + vocabList.length) % vocabList.length);
            };

            const handleQuizChange = (questionId, option) => {
                if (!quizSubmitted) {
                    setQuizAnswers(prev => ({ ...prev, [questionId]: option }));
                }
            };

            const submitQuiz = () => {
                let calculatedScore = 0;
                quizQuestions.forEach(q => {
                    if (quizAnswers[q.id] === q.answer) {
                        calculatedScore++;
                    }
                });
                setScore(calculatedScore);
                setQuizSubmitted(true);
            };

            const resetQuiz = () => {
                setQuizAnswers({});
                setQuizSubmitted(false);
                setScore(0);
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* 头部标题区域 */}
                    <header className="bg-teal-600 text-white shadow-md">
                        <div className="max-w-4xl mx-auto p-4 sm:p-6">
                            <h1 className="text-2xl sm:text-3xl font-bold flex items-center gap-3">
                                <Book size={32} />
                                我跟她都认识五年了
                            </h1>
                            <h2 className="text-lg sm:text-xl font-medium mt-2 text-teal-100 border-b border-teal-500 pb-2 inline-block">
                                Dilfuza Kāng lǎo shī bilan xitoy tilini o'rganmiz
                            </h2>
                            <p className="mt-2 text-teal-50 text-sm sm:text-base">U bilan tanishganimga besh yil boʻldi | HSK 3 Lesson 7</p>
                        </div>
                    </header>

                    {/* 导航菜单 */}
                    <nav className="bg-white border-b shadow-sm sticky top-0 z-10">
                        <div className="max-w-4xl mx-auto flex flex-wrap gap-2 p-2 sm:px-6">
                            <button onClick={() => setActiveTab('flashcards')} className={`flex items-center gap-2 px-4 py-2 rounded-full font-medium transition-colors ${activeTab === 'flashcards' ? 'bg-teal-100 text-teal-700' : 'text-gray-600 hover:bg-gray-100'}`}>
                                <Book size={18} /> 生词闪卡
                            </button>
                            <button onClick={() => setActiveTab('dialogues')} className={`flex items-center gap-2 px-4 py-2 rounded-full font-medium transition-colors ${activeTab === 'dialogues' ? 'bg-teal-100 text-teal-700' : 'text-gray-600 hover:bg-gray-100'}`}>
                                <MessageCircle size={18} /> 对话内容
                            </button>
                            <button onClick={() => setActiveTab('grammar')} className={`flex items-center gap-2 px-4 py-2 rounded-full font-medium transition-colors ${activeTab === 'grammar' ? 'bg-teal-100 text-teal-700' : 'text-gray-600 hover:bg-gray-100'}`}>
                                <FileText size={18} /> 语法解释
                            </button>
                            <button onClick={() => setActiveTab('quiz')} className={`flex items-center gap-2 px-4 py-2 rounded-full font-medium transition-colors ${activeTab === 'quiz' ? 'bg-teal-100 text-teal-700' : 'text-gray-600 hover:bg-gray-100'}`}>
                                <CheckCircle size={18} /> 综合测试
                            </button>
                        </div>
                    </nav>

                    {/* 主体内容区域 */}
                    <main className="flex-grow max-w-4xl mx-auto w-full p-4 sm:p-6 pb-20">
                        
                        {/* 闪卡模块 */}
                        {activeTab === 'flashcards' && (
                            <div className="flex flex-col items-center justify-center pt-8">
                                <div className="text-center mb-6">
                                    <h2 className="text-xl font-bold text-gray-700">生词闪卡 (Yangi so'zlar)</h2>
                                    <p className="text-sm text-gray-500 mt-1">Kartani ustiga bosib tarjimasini ko'ring</p>
                                </div>
                                
                                <div 
                                    className="relative w-80 h-64 sm:w-96 sm:h-72 cursor-pointer perspective-1000"
                                    onClick={() => setIsFlipped(!isFlipped)}
                                >
                                    <div className={`w-full h-full transition-transform duration-500 preserve-3d relative ${isFlipped ? 'rotate-y-180' : ''}`}>
                                        <div className="absolute w-full h-full bg-white rounded-2xl shadow-xl border border-gray-100 flex flex-col items-center justify-center p-6 backface-hidden">
                                            <div className="text-6xl font-medium text-gray-800 mb-4">{vocabList[currentCard].hanzi}</div>
                                            <div className="text-2xl text-teal-600 tracking-wide">{vocabList[currentCard].pinyin}</div>
                                            <div className="absolute bottom-4 text-xs text-gray-400">{currentCard + 1} / {vocabList.length}</div>
                                        </div>
                                        
                                        <div className="absolute w-full h-full bg-teal-50 rounded-2xl shadow-xl border border-teal-200 flex flex-col items-center justify-center p-6 backface-hidden rotate-y-180">
                                            <div className="text-3xl font-bold text-teal-800 text-center">{vocabList[currentCard].uzbek}</div>
                                            <div className="absolute bottom-4 text-xs text-teal-500">{currentCard + 1} / {vocabList.length}</div>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex gap-6 mt-10">
                                    <button onClick={handlePrevCard} className="p-3 bg-white border border-gray-200 rounded-full hover:bg-gray-50 shadow-sm transition-all active:scale-95">
                                        <ChevronLeft className="text-gray-600" />
                                    </button>
                                    <button onClick={handleNextCard} className="p-3 bg-white border border-gray-200 rounded-full hover:bg-gray-50 shadow-sm transition-all active:scale-95">
                                        <ChevronRight className="text-gray-600" />
                                    </button>
                                </div>
                            </div>
                        )}

                        {/* 对话模块 */}
                        {activeTab === 'dialogues' && (
                            <div className="space-y-8 animate-fade-in">
                                <h2 className="text-2xl font-bold text-gray-800 mb-6">对话内容 (Matnlar / Dialogues / Диалоги)</h2>
                                {dialogues.map((dialogue, idx) => (
                                    <div key={idx} className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                                        <div className="bg-teal-600 px-4 py-3 text-white font-medium">
                                            {dialogue.title}
                                        </div>
                                        <div className="p-4 sm:p-6 divide-y divide-gray-50">
                                            {dialogue.lines.map((line, lIdx) => (
                                                <div key={lIdx} className="py-4 first:pt-0 last:pb-0 flex flex-col sm:flex-row gap-3 sm:gap-6">
                                                    <div className="sm:w-20 shrink-0">
                                                        <span className="inline-block bg-teal-100 text-teal-800 text-xs font-bold px-2 py-1 rounded">
                                                            {line.speaker}
                                                        </span>
                                                    </div>
                                                    <div className="flex-1 space-y-1">
                                                        <p className="text-lg text-gray-900">{line.hanzi}</p>
                                                        <p className="text-sm text-gray-500 font-medium mb-2">{line.pinyin}</p>
                                                        <div className="space-y-1 mt-1">
                                                            <p className="text-sm text-blue-600"><span className="font-semibold text-xs opacity-75 mr-1">UZ:</span>{line.uzbek}</p>
                                                            <p className="text-sm text-emerald-600"><span className="font-semibold text-xs opacity-75 mr-1">EN:</span>{line.en}</p>
                                                            <p className="text-sm text-violet-600"><span className="font-semibold text-xs opacity-75 mr-1">RU:</span>{line.ru}</p>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* 语法模块 */}
                        {activeTab === 'grammar' && (
                            <div className="space-y-8 animate-fade-in">
                                <h2 className="text-2xl font-bold text-gray-800 mb-6">语法解释 (Grammatika / Grammar / Грамматика)</h2>
                                {grammarPoints.map((point, idx) => (
                                    <div key={idx} className="bg-white rounded-xl shadow-sm border border-gray-100 p-5 sm:p-7">
                                        <h3 className="text-lg font-bold text-teal-700 mb-3">{point.title}</h3>
                                        <div className="mb-5 space-y-1 bg-teal-50/50 p-3 rounded-lg border border-teal-100">
                                            <p className="text-sm text-gray-700"><span className="font-semibold text-xs opacity-75 mr-1 text-blue-600">UZ:</span>{point.explanation.uz}</p>
                                            <p className="text-sm text-gray-700"><span className="font-semibold text-xs opacity-75 mr-1 text-emerald-600">EN:</span>{point.explanation.en}</p>
                                            <p className="text-sm text-gray-700"><span className="font-semibold text-xs opacity-75 mr-1 text-violet-600">RU:</span>{point.explanation.ru}</p>
                                        </div>
                                        
                                        <div className="space-y-4">
                                            {point.patterns.map((pattern, pIdx) => (
                                                <div key={pIdx} className="bg-gray-50 rounded-lg p-4 border-l-4 border-teal-500">
                                                    <p className="font-mono text-sm sm:text-base font-semibold text-gray-800 mb-2">{pattern.rule}</p>
                                                    <div className="mb-4 space-y-1">
                                                        <p className="text-sm text-gray-600"><span className="font-semibold text-xs mr-1 text-blue-500">UZ:</span>{pattern.desc.uz}</p>
                                                        <p className="text-sm text-gray-600"><span className="font-semibold text-xs mr-1 text-emerald-500">EN:</span>{pattern.desc.en}</p>
                                                        <p className="text-sm text-gray-600"><span className="font-semibold text-xs mr-1 text-violet-500">RU:</span>{pattern.desc.ru}</p>
                                                    </div>
                                                    {pattern.examples && pattern.examples.length > 0 && (
                                                        <div className="space-y-3 mt-3 pt-3 border-t border-gray-200">
                                                            {pattern.examples.map((ex, eIdx) => (
                                                                <div key={eIdx} className="relative pl-4 before:content-['•'] before:absolute before:left-0 before:text-teal-500 space-y-0.5">
                                                                    <p className="text-base text-gray-800 font-medium mb-1">{ex.hanzi}</p>
                                                                    <p className="text-xs text-blue-600"><span className="font-semibold opacity-75 mr-1">UZ:</span>{ex.uz}</p>
                                                                    <p className="text-xs text-emerald-600"><span className="font-semibold opacity-75 mr-1">EN:</span>{ex.en}</p>
                                                                    <p className="text-xs text-violet-600"><span className="font-semibold opacity-75 mr-1">RU:</span>{ex.ru}</p>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* 测试模块 */}
                        {activeTab === 'quiz' && (
                            <div className="animate-fade-in">
                                <div className="text-center mb-8 bg-gradient-to-r from-teal-600 to-blue-600 text-white rounded-2xl p-6 shadow-md">
                                    <GraduationCap size={40} className="mx-auto mb-3 opacity-90" />
                                    <h2 className="text-2xl font-bold mb-2">生词与语法综合测试 (Test)</h2>
                                    <p className="text-teal-100 font-medium tracking-wide">Dilfuza Kāng lǎo shī bilan xitoy tilini o'rganmiz</p>
                                </div>

                                <div className="space-y-6">
                                    {quizQuestions.map((q, idx) => (
                                        <div key={q.id} className="bg-white p-5 sm:p-6 rounded-xl shadow-sm border border-gray-200">
                                            <div className="flex gap-3 mb-4">
                                                <span className="shrink-0 w-8 h-8 flex items-center justify-center bg-gray-100 text-gray-600 font-bold rounded-full">
                                                    {idx + 1}
                                                </span>
                                                <h3 className="text-lg font-medium text-gray-800 pt-1">{q.question}</h3>
                                            </div>
                                            
                                            <div className="grid sm:grid-cols-2 gap-3 pl-11">
                                                {q.options.map((option, optIdx) => {
                                                    const isSelected = quizAnswers[q.id] === option;
                                                    const isCorrect = q.answer === option;
                                                    const isWrong = isSelected && !isCorrect;
                                                    
                                                    let btnClass = "text-left px-4 py-3 rounded-lg border transition-all ";
                                                    if (quizSubmitted) {
                                                        if (isCorrect) btnClass += "bg-green-50 border-green-500 text-green-800 font-medium";
                                                        else if (isWrong) btnClass += "bg-red-50 border-red-300 text-red-800";
                                                        else btnClass += "bg-gray-50 border-gray-200 text-gray-500 opacity-50";
                                                    } else {
                                                        if (isSelected) btnClass += "bg-teal-50 border-teal-500 text-teal-800 shadow-sm";
                                                        else btnClass += "bg-white border-gray-200 hover:border-teal-300 hover:bg-teal-50/30";
                                                    }

                                                    return (
                                                        <button
                                                            key={optIdx}
                                                            disabled={quizSubmitted}
                                                            onClick={() => handleQuizChange(q.id, option)}
                                                            className={btnClass}
                                                        >
                                                            <div className="flex justify-between items-center">
                                                                <span>{option}</span>
                                                                {quizSubmitted && isCorrect && <CheckCircle size={18} className="text-green-500" />}
                                                            </div>
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div className="mt-8 pt-6 border-t border-gray-200 flex flex-col items-center">
                                    {!quizSubmitted ? (
                                        <button 
                                            onClick={submitQuiz}
                                            disabled={Object.keys(quizAnswers).length !== quizQuestions.length}
                                            className="bg-teal-600 text-white px-8 py-3 rounded-full font-bold shadow-md hover:bg-teal-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                                        >
                                            Natijani ko'rish (交卷)
                                        </button>
                                    ) : (
                                        <div className="text-center w-full max-w-md bg-white p-6 rounded-2xl shadow-lg border border-teal-100">
                                            <Award size={48} className={`mx-auto mb-3 ${score > 10 ? 'text-yellow-500' : 'text-gray-400'}`} />
                                            <h3 className="text-2xl font-bold text-gray-800 mb-2">Test Natijasi</h3>
                                            <p className="text-4xl font-extrabold text-teal-600 mb-4">{score} / {quizQuestions.length}</p>
                                            <p className="text-gray-600 mb-6">
                                                {score === quizQuestions.length ? "Mukammal! A'lo darajada. (非常好！)" : 
                                                score >= 10 ? "Yaxshi natija, biroz takrorlang. (不错，继续努力！)" : 
                                                "Ko'proq dars qilish kerak. (需要多加练习！)"}
                                            </p>
                                            <button 
                                                onClick={resetQuiz}
                                                className="flex items-center justify-center gap-2 w-full bg-gray-100 text-gray-700 hover:bg-gray-200 px-6 py-3 rounded-full font-medium transition-colors"
                                            >
                                                <RotateCcw size={18} /> Qayta ishlash (再测一次)
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* 页脚 */}
                    <footer className="bg-gray-800 text-gray-300 py-6 text-center text-sm mt-auto">
                        <div className="max-w-4xl mx-auto px-4">
                            <p className="mb-1 font-medium tracking-wider">HSK 3 Standard Course - Lesson 7</p>
                            <p className="opacity-75">© 2026 Dilfuza Kāng lǎo shī (telegram@diffila)</p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
